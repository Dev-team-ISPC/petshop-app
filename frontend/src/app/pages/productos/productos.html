<div class="container mt-4">
  <h2 class="mb-4">Nuestros Productos</h2>
  <div class="row g-4">
    <div class="col-md-4" *ngFor="let p of productos">
      <div class="card h-100 shadow-sm">
        <img *ngIf="p.imagen" [src]="p.imagen" class="card-img-top" style="height:200px; object-fit:cover">
        <div class="card-body">
          <h5 class="card-title">{{ p.nombre }}</h5>
          <span class="badge bg-secondary mb-2">{{ p.categoria_nombre }}</span>
          <p class="card-text text-muted">{{ p.descripcion }}</p>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <span class="fw-bold text-success fs-5">$ {{ p.precio }}</span>
          <span class="text-muted small">Stock: {{ p.stock }}</span>
        </div>
      </div>
    </div>
    <div *ngIf="productos.length === 0" class="text-center text-muted py-5">
      <p>No hay productos disponibles.</p>
    </div>
  </div>
</div>
